<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Janis Ringli</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #1e1e1e;
      border: 2px solid #333;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: #888;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      background: #1e1e1e;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #333;
      transition: background 0.15s, border-color 0.15s;
    }

    .links a:hover {
      background: #2a2a2a;
      border-color: #555;
    }

    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>Janis Ringli</h1>
    <p class="tagline">Developer &amp; Creator</p>
    <nav class="links">
      <a href="https://github.com/janisringli" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
  <footer>&copy; <span id="yr"></span> Janis Ringli</footer>
  <script>document.getElementById("yr").textContent = new Date().getFullYear();</script>
</body>
</html>
